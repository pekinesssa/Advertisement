syntax = "proto3";

package slot;

option go_package = "2025_2_404/protos/gen/go/slot";

message Slot {
    string id = 1;
    string user_id = 2;
    string slot_name = 3;
    int32 min_cost_adv = 4;
    string format_of_banner = 5;  
    string status = 6;      
    string back_color = 7; 
    string text_color = 8;
}

message AdSlot  {
    string title = 1;
    string description = 2;
    string image_src = 3;
    string link = 4;
    string id = 5;
}

message MetricsForDay{
    string slot_id = 1;
    int32 clicks = 2;
    int32 impressions = 3;
    string event_data = 4;
}

message CreateSlotRequest {
    Slot slot = 1;
}

message CreateSlotResponse {
    string id = 1;
}

message GetSlotRequest {
    string id = 1;
}

message GetSlotResponse {
    Slot slot = 1;
    AdSlot ad_slot = 2;
}

message ListSlotsRequest {}
message ListSlotsResponse {
    repeated Slot slots = 1;
}

message UpdateSlotRequest {
    Slot slot = 1;
}
message UpdateSlotResponse {}

message DeleteSlotRequest {
    string id = 1;
}
message DeleteSlotResponse {}

message CreateMetricRequest{
    string slot_id = 1;
    string ad_id = 2;
    string event_type = 3;
}

message CreateMetricResponse{}

message GetMetricsRequest{
    string slot_id = 1;
}

message GetMetricsResponse{
    string slot_id = 1;
    int32 total_clicks = 2;
    int32 total_impressions = 3;
    repeated MetricsForDay metrics = 4;
}

service SlotServ {
    rpc CreateSlot(CreateSlotRequest) returns (CreateSlotResponse);
    rpc GetSlot(GetSlotRequest) returns (GetSlotResponse);
    rpc ListSlots(ListSlotsRequest) returns (ListSlotsResponse);
    rpc UpdateSlot(UpdateSlotRequest) returns (UpdateSlotResponse);
    rpc DeleteSlot(DeleteSlotRequest) returns (DeleteSlotResponse);
    rpc CreateMetric(CreateMetricRequest) returns (CreateMetricResponse);
    rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
}